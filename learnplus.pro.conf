<VirtualHost *:80>
    ServerName learnplus.pro
    ServerAlias www.learnplus.pro
    DocumentRoot /var/www/learnplus.pro
    <Directory /var/www/learnplus.pro>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/learnplus_error.log
    CustomLog ${APACHE_LOG_DIR}/learnplus_access.log combined
</VirtualHost>
